# =============================================================================
# movie-finder — full-stack docker-compose (integration / full-stack run)
#
# PURPOSE: Run the complete application stack for end-to-end verification or
# full-stack local use. Uses the production-grade `runtime` image (no source
# mounts, no hot-reload). For day-to-day backend development use the standalone
# backend stack instead:
#
#   cd backend/ && make up      ← backend dev stack (hot-reload, source mounts)
#
# ⚠  NEVER run this stack at the same time as the backend standalone stack.
#    Both bind to port 5432 (postgres) and 8000 (backend) by default.
#    Only one stack can hold those host ports at a time.
#
# Services (default stack — always started):
#   postgres    — session / user database (PostgreSQL)
#   backend     — FastAPI + LangGraph application (runtime image, with migrations)
#   frontend    — Angular SPA served by nginx (reverse-proxies API to backend)
#
# Services (opt-in profiles):
#   structurizr — Structurizr Lite C4 architecture viewer (--profile docs)
#   mkdocs      — MkDocs documentation server           (--profile mkdocs)
#
# Qdrant is NOT included here. The backend connects to the production Qdrant
# Cloud cluster via QDRANT_URL / QDRANT_API_KEY_RO in your .env file.
# There is no local Qdrant container.
#
# Usage:
#   cp .env.example .env && $EDITOR .env              # fill in secrets (first run)
#   make up                                           # full application stack
#   docker compose logs -f backend                    # stream backend logs
#   make down                                         # stop and clean up
#   docker compose --profile docs up structurizr      # C4 viewer   → http://localhost:18080
#   make mkdocs                                       # Docs server → http://localhost:8001
#
# Backup and restore:
#   make db-backup                                  # dump full-stack database
#   make db-restore FILE=backups/db_<timestamp>.sql # restore into full-stack database
#   cd backend/ && make db-backup                   # dump backend standalone database
#
# Submodules must be initialised before building:
#   git submodule update --init --recursive
# =============================================================================

name: movie-finder

services:

  # ---------------------------------------------------------------------------
  # PostgreSQL — session and user database
  #
  # The init script creates the `movie_finder_test` database on first bootstrap
  # so that `make test` (run from backend/) works against this postgres instance
  # without creating a second container.
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: movie-finder-postgres
    environment:
      POSTGRES_DB:       ${DB_NAME:-movie_finder}
      POSTGRES_USER:     ${DB_USER:-movie_finder}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-movie_finder} -d ${DB_NAME:-movie_finder}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Backend — FastAPI application (production runtime image)
  #
  # Uses the `runtime` Dockerfile target: no source mounts, no hot-reload.
  # The entrypoint (start-backend.sh) runs `alembic upgrade head` before
  # starting uvicorn, so migrations run automatically on every `docker compose up`.
  #
  # For backend development with hot-reload, use the standalone stack instead:
  #   cd backend/ && make up
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime
    image: movie-finder-backend:local
    container_name: movie-finder-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Always point the app at the compose-internal postgres service.
      # This overrides DATABASE_URL from .env (which may point to localhost).
      DATABASE_URL: "postgresql://${DB_USER:-movie_finder}:${DB_PASSWORD:?DB_PASSWORD is required}@postgres:5432/${DB_NAME:-movie_finder}"

      # Defaults for app runtime settings (override via .env if needed).
      APP_ENV:  ${APP_ENV:-production}
      APP_PORT: ${APP_PORT:-8000}

      # CORS must explicitly allow the frontend origin.
      # Override in .env for production domains.
      CORS_ORIGINS: ${CORS_ORIGINS:-["http://localhost","http://localhost:80"]}

      # Legacy Qdrant variable names — compatibility bridge until chain#9 merges.
      # Remove once movie-finder-chain#9 is merged and deployed.
      QDRANT_ENDPOINT:   ${QDRANT_URL:-}
      QDRANT_API_KEY:    ${QDRANT_API_KEY_RO:-}
      QDRANT_COLLECTION: ${QDRANT_COLLECTION_NAME:-movies}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      # /health/live — liveness probe, no DB required. Consistent with the
      # Dockerfile HEALTHCHECK and backend standalone docker-compose.yml.
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/live', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 45s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Frontend — Angular SPA + nginx reverse-proxy
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: runner
    image: movie-finder-frontend:local
    container_name: movie-finder-frontend
    ports:
      - "80:80"
    environment:
      # Empty string = same-origin; nginx proxies /auth /chat /health to backend
      API_URL: ""
      BACKEND_URL: "http://backend:8000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Structurizr Lite — interactive C4 architecture diagram viewer (docs only)
  #
  # Diagrams: System Context · Containers · Components · Azure + Local Deployment
  #
  # Start with:
  #   docker compose --profile docs up structurizr
  #   open http://localhost:18080
  #
  # Port 18080 avoids conflicts with Jenkins (8080) and FastAPI (8000).
  # Mounts docs/architecture read-write because Structurizr Local writes
  # workspace.json and .structurizr/ alongside workspace.dsl.
  # Generated files are gitignored. No .env file or application secrets required.
  # ---------------------------------------------------------------------------
  structurizr:
    profiles: [docs]
    image: structurizr/structurizr:latest
    container_name: movie-finder-structurizr
    command: local
    ports:
      - "18080:8080"
    volumes:
      - ./docs/architecture:/usr/local/structurizr
    restart: "no"

  # ---------------------------------------------------------------------------
  # PlantUML server — local render server for VS Code live diagram preview
  #
  # Powers the VS Code jebbs.plantuml extension in "PlantUMLServer" mode so
  # you do not need a local plantuml/graphviz install. No host install required.
  #
  # Start with:
  #   make plantuml     # → http://localhost:18088
  #
  # Then open any .puml file in VS Code and press Alt+D (Option+D on macOS).
  # The extension sends the diagram source to this server and shows the preview.
  #
  # Port 18088 — avoids conflicts with Jenkins (8080), FastAPI (8000),
  # Structurizr (18080), and MkDocs (8001).
  # ---------------------------------------------------------------------------
  plantuml:
    profiles: [plantuml]
    image: plantuml/plantuml-server:jetty
    container_name: movie-finder-plantuml
    ports:
      - "18088:8080"
    restart: "no"

  # ---------------------------------------------------------------------------
  # MkDocs documentation server (mkdocs profile — opt-in)
  #
  # Serves the MkDocs documentation site with live-reload.
  # Runs prepare-docs.sh first to copy submodule READMEs and render PlantUML PNGs.
  # Requires: plantuml + graphviz are included in the image build.
  #
  # Start with:
  #   make mkdocs     # → http://localhost:8001
  #
  # Port 8001 matches mkdocs.yml dev_addr to avoid conflict with FastAPI (8000).
  # Mounts repo root read-write so prepare-docs.sh can write generated files.
  # ---------------------------------------------------------------------------
  mkdocs:
    profiles: [mkdocs]
    build:
      context: .
      dockerfile: Dockerfile.mkdocs
    image: movie-finder-mkdocs:local
    container_name: movie-finder-mkdocs
    ports:
      - "8001:8001"
    volumes:
      - .:/workspace
    working_dir: /workspace
    command: >
      sh -c "./scripts/prepare-docs.sh && mkdocs serve --dev-addr 0.0.0.0:8001"
    restart: "no"

volumes:
  postgres_data:
    name: movie-finder-postgres-data
