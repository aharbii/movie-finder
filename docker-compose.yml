# =============================================================================
# movie-finder — full-stack docker-compose
#
# Services:
#   qdrant    — vector store (Qdrant OSS)
#   backend   — FastAPI + LangGraph application
#   frontend  — Angular SPA served by nginx (reverse-proxies API to backend)
#
# Usage:
#   cp .env.example .env && $EDITOR .env   # fill in secrets
#   docker compose up --build              # build and start everything
#   docker compose up frontend             # only frontend + its deps
#   docker compose logs -f backend         # stream backend logs
#
# Submodules must be initialised before building:
#   git submodule update --init --recursive
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # Qdrant — vector store
  # Production: use Qdrant Cloud (set QDRANT_ENDPOINT + QDRANT_API_KEY in .env)
  # Development: use this local container
  # ---------------------------------------------------------------------------
  qdrant:
    image: qdrant/qdrant:v1.13.0
    container_name: movie-finder-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Backend — FastAPI application
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime
    image: movie-finder-backend:local
    container_name: movie-finder-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Override Qdrant to use the local container in dev
      QDRANT_ENDPOINT: "http://qdrant:6333"
      QDRANT_API_KEY: ""
    depends_on:
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Frontend — Angular SPA + nginx reverse-proxy
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: runner
    image: movie-finder-frontend:local
    container_name: movie-finder-frontend
    ports:
      - "80:80"
    environment:
      # Empty string = same-origin; nginx proxies /auth /chat /health to backend
      API_URL: ""
      BACKEND_URL: "http://backend:8000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  qdrant_data:
    name: movie-finder-qdrant-data
