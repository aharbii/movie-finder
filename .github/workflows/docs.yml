name: Deploy Documentation

# ─────────────────────────────────────────────────────────────────────────────
# Triggers
# ─────────────────────────────────────────────────────────────────────────────
on:
  push:
    branches: [main]
    paths:
      # Docs submodule pointer
      - "docs"
      - "mkdocs.yml"
      - "requirements-docs.txt"
      # Root-level files whose content is pulled into docs
      - "README.md"
      - "CONTRIBUTING.md"
      - "ONBOARDING.md"
      # Submodule README files (pointer changes trigger a full rebuild)
      - "backend"
      - "frontend"
      - "rag"

  pull_request:
    branches: [main]
    paths:
      # Docs submodule pointer
      - "docs"
      - "mkdocs.yml"
      - "requirements-docs.txt"
      # Root-level files whose content is pulled into docs
      - "README.md"
      - "CONTRIBUTING.md"
      - "ONBOARDING.md"
      # Submodule README files (pointer changes trigger a full rebuild)
      - "backend"
      - "frontend"
      - "rag"

  # Allow manual trigger from the GitHub Actions UI
  workflow_dispatch:

# ─────────────────────────────────────────────────────────────────────────────
# Permissions
# pages: write + id-token: write are required by actions/deploy-pages.
# contents: read is sufficient — no branch push needed.
# ─────────────────────────────────────────────────────────────────────────────
permissions:
  contents: read
  pages: write
  id-token: write

# Cancel in-progress runs when a newer commit arrives
concurrency:
  group: docs-deploy
  cancel-in-progress: true

# GitHub will force JavaScript actions onto Node.js 24 starting June 2, 2026.
# Opt in now so the docs workflow stays ahead of the runner default.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# ─────────────────────────────────────────────────────────────────────────────
# Jobs
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  build:
    name: Build MkDocs site
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout with app submodules ─────────────────────────────────────
      # 'submodules: recursive' populates backend, frontend, docs (and their
      # children). rag/ and mcp/* use 'update = none' so they are skipped here
      # and initialised explicitly in the next step.
      - name: Checkout repository (with submodules)
        uses: actions/checkout@v6.0.1
        with:
          submodules: recursive
          fetch-depth: 0 # full history required for git-revision-date plugin
          token: ${{ secrets.GH_PAT }} # PAT with repo scope — required to clone private submodules

      # ── 1b. Populate rag/ for docs build ────────────────────────────────────
      # rag uses update = none (offline tool, not required to run the app or CI).
      # The recursive checkout skips it. Docs need rag/README.md, so we do a
      # shallow clone directly with the PAT to avoid credential-helper ambiguity
      # that affects cross-repo submodule init in GH Actions.
      - name: Populate rag for docs build
        run: |
          set -euo pipefail
          rm -rf rag
          git clone --depth 1 \
            "https://x-access-token:${{ secrets.GH_PAT }}@github.com/aharbii/movie-finder-rag.git" \
            rag

      # ── 2. Set up Python ────────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v6.1.0
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements-docs.txt

      # ── 3. Install MkDocs and plugins ───────────────────────────────────────
      - name: Install documentation dependencies
        run: pip install -r requirements-docs.txt

      # ── 3b. Install PlantUML and Graphviz ───────────────────────────────────
      # PlantUML renders architecture diagrams to PNG at build time.
      # PNGs are gitignored — generated here so MkDocs can embed them.
      - name: Install PlantUML and Graphviz
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            plantuml graphviz default-jre-headless

      # ── 4. Populate generated pages from submodules ─────────────────────────
      #
      # Files marked "generated" in mkdocs.yml are sourced from submodule READMEs.
      # They are not committed to docs/ — this step creates them at build time.
      # ─────────────────────────────────────────────────────────────────────────
      - name: Prepare generated documentation pages
        run: |
          set -euo pipefail

          # Ensure target directories exist
          mkdir -p docs/services docs/contributing

          # ── onboarding.md ────────────────────────────────────────────────────
          cp ONBOARDING.md docs/onboarding.md
          sed -i \
            -e 's|](backend/README\.md)|](services/backend.md)|g' \
            -e 's|](frontend/README\.md)|](services/frontend.md)|g' \
            -e 's|](backend/chain/README\.md)|](services/chain.md)|g' \
            -e 's|](backend/chain/imdbapi/README\.md)|](services/imdbapi.md)|g' \
            -e 's|](rag/README\.md)|](services/rag-ingestion.md)|g' \
            -e 's|](CONTRIBUTING\.md#|](contributing/index.md#|g' \
            -e 's|](CONTRIBUTING\.md)|](contributing/index.md)|g' \
            -e 's|](\.github/PULL_REQUEST_TEMPLATE\.md)|](https://github.com/aharbii/movie-finder/blob/main/.github/PULL_REQUEST_TEMPLATE.md)|g' \
            -e 's|](docs/devops-setup\.md\b|](devops/setup.md|g' \
            -e 's|](docs/devops/setup\.md|](devops/setup.md|g' \
            -e 's|](docs/architecture/|](architecture/|g' \
            -e 's|](docs/api/|](api/|g' \
            -e 's|#6-ports-and-urls-at-a-glance|#7-ports-and-urls-at-a-glance|g' \
            -e 's|#7-run-the-full-stack-with-docker|#8-run-the-full-stack-with-docker|g' \
            docs/onboarding.md

          # ── contributing/index.md ─────────────────────────────────────────────
          cp CONTRIBUTING.md docs/contributing/index.md
          sed -i \
            -e 's|](ONBOARDING\.md)|](../onboarding.md)|g' \
            -e 's|](backend/CONTRIBUTING\.md)|](backend.md)|g' \
            -e 's|](frontend/CONTRIBUTING\.md)|](frontend.md)|g' \
            -e 's|](backend/README\.md)|](../services/backend.md)|g' \
            -e 's|](frontend/README\.md)|](../services/frontend.md)|g' \
            -e 's|](backend/chain/README\.md)|](../services/chain.md)|g' \
            -e 's|](backend/chain/imdbapi/README\.md)|](../services/imdbapi.md)|g' \
            -e 's|](rag/README\.md)|](../services/rag-ingestion.md)|g' \
            -e 's|](docs/devops-setup\.md\b|](../devops/setup.md|g' \
            -e 's|](docs/devops/setup\.md)|](../devops/setup.md)|g' \
            -e 's|](docs/architecture/|](../architecture/|g' \
            -e 's|](docs/api/|](../api/|g' \
            -e 's|](\.github/PULL_REQUEST_TEMPLATE\.md)|](https://github.com/aharbii/movie-finder/blob/main/.github/PULL_REQUEST_TEMPLATE.md)|g' \
            docs/contributing/index.md

          # ── services/backend.md ───────────────────────────────────────────────
          cp backend/README.md docs/services/backend.md
          sed -i \
            -e 's|](chain/README\.md)|](chain.md)|g' \
            -e 's|](chain/imdbapi/README\.md)|](imdbapi.md)|g' \
            -e 's|](chain/CONTRIBUTING\.md)|](../contributing/backend.md)|g' \
            -e 's|](chain/imdbapi/CONTRIBUTING\.md)|](../contributing/backend.md)|g' \
            -e 's|](imdbapi/README\.md)|](imdbapi.md)|g' \
            -e 's|](rag_ingestion/README\.md)|](rag-ingestion.md)|g' \
            -e 's|](rag_ingestion/CONTRIBUTING\.md)|](../contributing/rag-ingestion.md)|g' \
            -e 's|](CONTRIBUTING\.md)|](../contributing/backend.md)|g' \
            -e 's|](INTEGRATION\.md)|](https://github.com/aharbii/movie-finder-backend/blob/main/INTEGRATION.md)|g' \
            -e 's|](app/README\.md)|](https://github.com/aharbii/movie-finder-backend/blob/main/app/README.md)|g' \
            -e 's|](deploy/provision\.sh)|](https://github.com/aharbii/movie-finder-backend/blob/main/deploy/provision.sh)|g' \
            -e 's|](\.\./infrastructure/docs/qdrant-secret-model\.md)|](https://github.com/aharbii/movie-finder-infrastructure/blob/main/docs/qdrant-secret-model.md)|g' \
            -e 's|](\.\./docs/devops-setup\.md|](../devops/setup.md|g' \
            -e 's|](\.\./docs/devops/setup\.md|](../devops/setup.md|g' \
            -e 's|](docs/devops-setup\.md|](../devops/setup.md|g' \
            -e 's|](docs/devops/setup\.md|](../devops/setup.md|g' \
            -e 's|](\.\./docs/architecture/|](../architecture/|g' \
            -e 's|](docs/architecture/|](../architecture/|g' \
            docs/services/backend.md

          # ── services/frontend.md ──────────────────────────────────────────────
          cp frontend/README.md docs/services/frontend.md
          sed -i \
            -e 's|](\.\./CONTRIBUTING\.md)|](../contributing/frontend.md)|g' \
            -e 's|](CONTRIBUTING\.md)|](../contributing/frontend.md)|g' \
            -e 's|](\.\./docs/devops-setup\.md|](../devops/setup.md|g' \
            -e 's|](\.\./docs/devops/setup\.md|](../devops/setup.md|g' \
            -e 's|](\.\./docs/architecture/|](../architecture/|g' \
            -e 's|](\.\./README\.md)|](../index.md)|g' \
            -e 's|](docker-entrypoint\.sh)|](https://github.com/aharbii/movie-finder-frontend/blob/main/docker-entrypoint.sh)|g' \
            docs/services/frontend.md

          # ── services/chain.md ─────────────────────────────────────────────────
          cp backend/chain/README.md docs/services/chain.md
          sed -i \
            -e 's|](CONTRIBUTING\.md)|](../contributing/backend.md)|g' \
            -e 's|](\.\./CONTRIBUTING\.md)|](../contributing/backend.md)|g' \
            -e 's|](\.\./README\.md)|](backend.md)|g' \
            -e 's|](\.\./imdbapi/README\.md)|](imdbapi.md)|g' \
            -e 's|](\.\./rag_ingestion/README\.md)|](rag-ingestion.md)|g' \
            docs/services/chain.md

          # ── services/imdbapi.md ───────────────────────────────────────────────
          cp backend/chain/imdbapi/README.md docs/services/imdbapi.md
          sed -i \
            -e 's|](CONTRIBUTING\.md)|](../contributing/backend.md)|g' \
            -e 's|](\.\./CONTRIBUTING\.md)|](../contributing/backend.md)|g' \
            -e 's|](\.\./README\.md)|](backend.md)|g' \
            -e 's|](\.\./chain/README\.md)|](chain.md)|g' \
            -e 's|](\.\./rag_ingestion/README\.md)|](rag-ingestion.md)|g' \
            docs/services/imdbapi.md

          # ── services/rag-ingestion.md ─────────────────────────────────────────
          cp rag/README.md docs/services/rag-ingestion.md
          sed -i \
            -e 's|](CONTRIBUTING\.md)|](../contributing/rag-ingestion.md)|g' \
            -e 's|](\.\./CONTRIBUTING\.md)|](../contributing/rag-ingestion.md)|g' \
            docs/services/rag-ingestion.md

          # ── contributing/backend.md ───────────────────────────────────────────
          cp backend/CONTRIBUTING.md docs/contributing/backend.md
          sed -i \
            -e 's|](\.\./docs/devops-setup\.md|](../devops/setup.md|g' \
            -e 's|](\.\./docs/devops/setup\.md|](../devops/setup.md|g' \
            -e 's|](docs/devops-setup\.md|](../devops/setup.md|g' \
            -e 's|](docs/devops/setup\.md|](../devops/setup.md|g' \
            -e 's|](\.\./README\.md)|](../services/backend.md)|g' \
            -e 's|](chain/README\.md)|](../services/chain.md)|g' \
            -e 's|](imdbapi/README\.md)|](../services/imdbapi.md)|g' \
            -e 's|](rag_ingestion/README\.md)|](../services/rag-ingestion.md)|g' \
            -e 's|](INTEGRATION\.md)|](https://github.com/aharbii/movie-finder-backend/blob/main/INTEGRATION.md)|g' \
            -e 's|](deploy/provision\.sh)|](https://github.com/aharbii/movie-finder-backend/blob/main/deploy/provision.sh)|g' \
            docs/contributing/backend.md

          # ── contributing/frontend.md ──────────────────────────────────────────
          cp frontend/CONTRIBUTING.md docs/contributing/frontend.md
          sed -i \
            -e 's|](\.\./CONTRIBUTING\.md)|](index.md)|g' \
            -e 's|](CONTRIBUTING\.md)|](index.md)|g' \
            -e 's|](\.\./docs/devops-setup\.md|](../devops/setup.md|g' \
            -e 's|](\.\./docs/devops/setup\.md|](../devops/setup.md|g' \
            -e 's|](docs/devops-setup\.md|](../devops/setup.md|g' \
            -e 's|](docs/devops/setup\.md|](../devops/setup.md|g' \
            -e 's|](\.\./README\.md)|](../services/frontend.md)|g' \
            -e 's|setup\.md#9-jenkins--credentials|setup.md#9-jenkins-credentials|g' \
            docs/contributing/frontend.md

          echo "Generated pages ready:"
          ls -la docs/onboarding.md docs/contributing/ docs/services/

      # ── 4b. Render PlantUML diagrams ─────────────────────────────────────────
      # Source .puml files are committed in docs/architecture/plantuml/.
      # PNGs are gitignored and must be generated before mkdocs build.
      - name: Render PlantUML diagrams
        run: |
          set -euo pipefail
          PLANTUML_DIR="docs/architecture/plantuml"
          mapfile -t puml_files < <(find "$PLANTUML_DIR" -name "*.puml" -type f | sort)
          echo "Found ${#puml_files[@]} PlantUML source files"
          if [ "${#puml_files[@]}" -gt 0 ]; then
            plantuml -png -DPLANTUML_LIMIT_SIZE=8192 "${puml_files[@]}"
            png_count=$(find "$PLANTUML_DIR" -name "*.png" | wc -l | tr -d ' ')
            echo "Rendered $png_count PNG files"
          fi

      # ── 5. Build static site ─────────────────────────────────────────────────
      - name: Build MkDocs site
        run: mkdocs build --verbose

      # ── 6. Package Pages artifact ────────────────────────────────────────────
      # Replaces actions/upload-pages-artifact until its transitive
      # upload-artifact dependency is fully on a Node 24-ready line.
      - name: Archive Pages artifact
        run: |
          tar \
            --dereference --hard-dereference \
            --directory site \
            -cvf "$RUNNER_TEMP/artifact.tar" \
            --exclude=.git \
            --exclude=.github \
            --exclude=".[^/]*" \
            .

      # ── 7. Upload built site as a Pages artifact ────────────────────────────
      - name: Upload Pages artifact
        uses: actions/upload-artifact@v6.0.0
        with:
          name: github-pages
          path: ${{ runner.temp }}/artifact.tar
          retention-days: 1
          if-no-files-found: error

  # ── Deploy job ───────────────────────────────────────────────────────────────
  # Runs after build. Uses GITHUB_TOKEN via the Pages deployment API —
  # no PAT or branch push required.
  # Prerequisite: Settings → Pages → Source → GitHub Actions
  deploy:
    name: Deploy to GitHub Pages
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v5.0.0
