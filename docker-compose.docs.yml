# =============================================================================
# movie-finder — documentation tooling compose
#
# Services:
#   structurizr  — Structurizr Lite C4 architecture viewer
#
# Usage:
#   docker compose -f docker-compose.docs.yml up
#   open http://localhost:18080
#
# No .env file or application secrets required.
# Port 18080 is used to avoid conflicts with Jenkins (8080) and FastAPI (8000).
#
# Reads workspace.dsl from docs/architecture/ (read-only mount).
# Submodules must be initialised first:
#   git submodule update --init --recursive
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # Structurizr Lite — interactive C4 architecture diagram viewer
  #
  # Diagrams rendered:
  #   System Context · Containers · FastAPI Components · Azure Deployment · Local Deployment
  # ---------------------------------------------------------------------------
  structurizr:
    image: structurizr/lite
    container_name: movie-finder-structurizr
    ports:
      - "18080:8080"
    volumes:
      - ./docs/architecture:/usr/local/structurizr:ro
    restart: "no"
