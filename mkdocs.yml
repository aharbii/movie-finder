site_name: Movie Finder
site_description: AI-powered movie discovery and Q&A — project documentation
site_author: Movie Finder Project
site_url: https://aharbii.github.io/movie-finder-docs/
repo_url: https://github.com/aharbii/movie-finder
repo_name: aharbii/movie-finder
edit_uri: edit/main/docs/
copyright: Released under the MIT License

docs_dir: docs
site_dir: site

# ─────────────────────────────────────────────────────────────
# Dev server
# Port 8001 — avoids conflict with FastAPI backend (8000)
# ─────────────────────────────────────────────────────────────
dev_addr: 127.0.0.1:8001

# ─────────────────────────────────────────────────────────────
# Exclude files that are not MkDocs pages
# docs/README.md is for GitHub browsing; index.md is the MkDocs home
# ─────────────────────────────────────────────────────────────
exclude_docs: |
  README.md
  architecture/architecture.mdj
  architecture/plantuml/*.puml
  ai-context/**

# ─────────────────────────────────────────────────────────────
# Theme
# ─────────────────────────────────────────────────────────────
theme:
  name: material
  language: en
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

# ─────────────────────────────────────────────────────────────
# Plugins
# ─────────────────────────────────────────────────────────────
plugins:
  - search
  - swagger-ui-tag    # renders <swagger-ui src="..."> in markdown

# ─────────────────────────────────────────────────────────────
# Markdown extensions
# ─────────────────────────────────────────────────────────────
markdown_extensions:
  - admonition
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.snippets
  - pymdownx.critic
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

# ─────────────────────────────────────────────────────────────
# Validation
#
# Generated pages (services/*.md, contributing/*.md, onboarding.md)
# are copied from submodule READMEs that contain repo-relative links.
# Those links are rewritten by scripts/prepare-docs.sh; residual
# references to code files (Dockerfile, eslint.config.js, etc.) are
# intentional — they resolve correctly on GitHub, not within MkDocs.
# ─────────────────────────────────────────────────────────────
validation:
  omitted_files: warn
  absolute_links: warn
  unrecognized_links: warn
  anchors: warn

# ─────────────────────────────────────────────────────────────
# Navigation
# ─────────────────────────────────────────────────────────────
nav:
  - Home: index.md

  - Getting Started:
      - Onboarding: onboarding.md          # generated by prepare-docs.sh

  - API Reference:
      - Overview & Swagger UI: api/index.md
      - OpenAPI Spec (raw): api/openapi.yaml

  - Architecture:
      - Overview: architecture/index.md
      - Structurizr DSL (C4): architecture/workspace.dsl
      - PlantUML Diagrams:
          - All Diagrams: architecture/plantuml/index.md
      - Decisions (ADRs):
          - Register: architecture/decisions/index.md
          - ADR-001 Initial Architecture: architecture/decisions/ADR-001-initial-architecture.md

  - Services:
      - Service Map: services/index.md
      - Backend (FastAPI): services/backend.md        # generated
      - Frontend (Angular): services/frontend.md      # generated
      - LangGraph Chain: services/chain.md            # generated
      - IMDb API Client: services/imdbapi.md          # generated
      - RAG Ingestion: services/rag-ingestion.md      # generated

  - Contributing:
      - Overview: contributing/index.md               # generated
      - Backend Guide: contributing/backend.md        # generated
      - Frontend Guide: contributing/frontend.md      # generated

  - DevOps:
      - Platform Setup: devops/setup.md

  - Internal:
      - Agent Queries: internal/agent-queries.md
